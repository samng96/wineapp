<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WineApp - Wine Inventory Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>🍷 WineApp</h1>
            <div class="header-controls">
                <span id="connection-status" class="status-indicator offline">Offline</span>
                <button id="sync-button" class="btn btn-secondary" disabled>Sync</button>
            </div>
        </header>

        <nav class="main-nav">
            <button class="nav-btn active" data-view="cellars">Cellars</button>
            <button class="nav-btn" data-view="wines">Wines</button>
            <button class="nav-btn" data-view="unshelved">Unshelved</button>
        </nav>

        <main class="main-content">
            <!-- Cellars View -->
            <div id="cellars-view" class="view active">
                <div class="view-header">
                    <h2>Cellars</h2>
                    <button id="add-cellar-btn" class="btn btn-primary">+ Add Cellar</button>
                </div>
                <div id="cellars-list" class="items-list">
                    <!-- Cellars will be loaded here -->
                </div>
            </div>

            <!-- Wines View -->
            <div id="wines-view" class="view">
                <div class="view-header">
                    <h2>Wine Collection</h2>
                    <div class="header-actions">
                        <input type="text" id="wine-search" class="search-input" placeholder="Search wines...">
                        <button id="add-wine-btn" class="btn btn-primary">+ Add Wine</button>
                    </div>
                </div>
                <div id="wines-list" class="items-list">
                    <!-- Wines will be loaded here -->
                </div>
            </div>

            <!-- Unshelved View -->
            <div id="unshelved-view" class="view">
                <div class="view-header">
                    <h2>Unshelved Wines</h2>
                </div>
                <div id="unshelved-list" class="items-list">
                    <!-- Unshelved wines will be loaded here -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">Modal Title</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Modal content will be inserted here -->
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="storage.js"></script>
    <script src="sync.js"></script>
    <script src="app.js"></script>
</body>
</html>
