<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WineApp</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-wrapper">
        <!-- App Content Container -->
        <div id="app">
            <!-- Main Content Area -->
            <main id="main-content">
            <!-- Home View (default) -->
            <div id="home-view" class="view active">
                <div class="view-header">
                    <h2>Wine App</h2>
                </div>
                <div class="splash-screen">
                    <h1>Welcome to Wine App</h1>
                </div>
            </div>

            <!-- Cellar Management View -->
            <div id="cellar-view" class="view">
                <div class="view-header">
                    <h2>Cellars</h2>
                    <div class="view-header-actions">
                        <button id="add-cellar-btn" class="icon-btn" title="Add Cellar">+</button>
                    </div>
                </div>
                <div id="cellar-list" class="list-container">
                    <!-- Cellars will be populated here -->
                </div>
            </div>

            <!-- Wines View -->
            <div id="wines-view" class="view">
                <div class="view-header">
                    <h2>Wines</h2>
                    <div class="view-header-actions">
                        <button id="wines-filter-btn" class="icon-btn filter-icon-btn" title="Filter">
                            <img src="assets/filter-icon.jpg" alt="Filter" class="filter-icon-img filter-icon" />
                            <span class="filter-arrow-icon hidden">▲</span>
                        </button>
                    </div>
                </div>
                <!-- Wines Filter Panel -->
                <div id="wines-filter-panel" class="filter-panel hidden">
                <div class="filter-panel-content">
                    <div class="filter-row">
                        <div class="filter-section">
                            <label class="filter-label">Wine Type</label>
                            <div class="filter-dropdown">
                                <button class="filter-dropdown-toggle" id="wine-type-toggle">
                                    <span id="wine-type-selected">All Types</span>
                                    <span class="dropdown-arrow">▼</span>
                                </button>
                                <div class="filter-dropdown-menu" id="wine-type-menu">
                                    <!-- Wine type checkboxes will be populated here -->
                                </div>
                            </div>
                        </div>

                        <div class="filter-section">
                            <label class="filter-label">Varietal</label>
                            <div class="filter-dropdown">
                                <button class="filter-dropdown-toggle" id="varietal-toggle">
                                    <span id="varietal-selected">All Varietals</span>
                                    <span class="dropdown-arrow">▼</span>
                                </button>
                                <div class="filter-dropdown-menu" id="varietal-menu">
                                    <!-- Varietal checkboxes will be populated here -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="filter-section">
                        <label class="filter-checkbox-label">
                            <input type="checkbox" id="filter-consumed" class="filter-checkbox">
                            <span>Consumed wines</span>
                        </label>
                    </div>

                    <div class="filter-section">
                        <label class="filter-checkbox-label">
                            <input type="checkbox" id="filter-unshelved" class="filter-checkbox">
                            <span>Unshelved wines</span>
                        </label>
                    </div>

                    <div class="filter-section">
                        <label class="filter-label">Search</label>
                        <input type="text" id="filter-search" class="filter-search-input" placeholder="Search wines...">
                    </div>
                </div>
                </div>
                <div id="wines-list" class="list-container">
                    <!-- Wines will be populated here -->
                </div>
            </div>

            <!-- Search View -->
            <div id="search-view" class="view">
                <div class="view-header">
                    <h2>Search</h2>
                </div>
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search wines...">
                </div>
                <div id="search-results" class="list-container">
                    <!-- Search results will be populated here -->
                </div>
            </div>

            <!-- Cellar Detail View -->
            <div id="cellar-detail-view" class="view">
                <div class="view-header">
                    <button id="back-to-cellars-btn" class="icon-btn" title="Back">←</button>
                    <h2 id="cellar-detail-name">Cellar</h2>
                    <div class="labels-toggle-container">
                        <label class="toggle-label">Labels</label>
                        <label class="toggle-switch">
                            <input type="checkbox" id="labels-toggle" checked>
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
                <div id="cellar-detail-content" class="cellar-detail-content">
                    <!-- Cellar shelves will be rendered here -->
                </div>
            </div>
            </main>

            <!-- Bottom Navigation Bar -->
            <nav id="bottom-nav">
            <button class="nav-btn" data-view="cellar" title="Cellars" type="button" id="cellar-nav-btn">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Cellars</span>
            </button>
            <button class="nav-btn" data-view="photo" title="Add Wines">
                <span class="nav-icon">📷</span>
                <span class="nav-label">Add wines</span>
            </button>
            <button class="nav-btn" data-view="wines" title="Wines">
                <span class="nav-icon">🍷</span>
                <span class="nav-label">Wines</span>
            </button>
            <div class="nav-search">
                <input type="text" id="nav-search-input" placeholder="Search...">
            </div>
            <button class="nav-btn" id="menu-btn" title="Menu">
                <span class="nav-icon">⋯</span>
                <span class="nav-label">Menu</span>
            </button>
        </nav>

        <!-- Menu Overlay -->
        <div id="menu-overlay" class="overlay hidden">
            <div class="overlay-content">
                <button class="overlay-close" id="close-menu-btn">×</button>
                <h3>Menu</h3>
                <ul class="menu-list">
                    <li><button class="menu-item" data-action="settings">Settings</button></li>
                    <li><button class="menu-item" data-action="profile">User Profile</button></li>
                </ul>
            </div>
        </div>

        <!-- Create Cellar Dialog -->
        <div id="create-cellar-dialog" class="overlay hidden">
            <div class="overlay-content dialog-content">
                <button class="overlay-close" onclick="window.cellarManager.hideCreateDialog()">×</button>
                <h3>Create New Cellar</h3>
                <form id="create-cellar-form">
                    <div class="form-group">
                        <label for="create-cellar-name">Name</label>
                        <input type="text" id="create-cellar-name" name="name" placeholder="e.g., Main Cellar">
                    </div>
                    <div class="form-group">
                        <label for="create-cellar-temperature">Temperature (°F)</label>
                        <input type="number" id="create-cellar-temperature" name="temperature" placeholder="e.g., 55" step="0.1">
                    </div>
                    <div class="form-group">
                        <label>Shelves</label>
                        <div id="shelves-container">
                            <!-- Shelf inputs will be added here -->
                        </div>
                        <button type="button" id="add-shelf-btn" class="btn-secondary">+ Add Shelf</button>
                    </div>
                    <div class="form-actions">
                        <button type="button" id="create-cellar-cancel" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary">Create</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Edit Cellar Dialog -->
        <div id="edit-cellar-dialog" class="overlay hidden">
            <div class="overlay-content dialog-content">
                <button class="overlay-close" onclick="window.cellarManager.hideEditDialog()">×</button>
                <h3>Edit Cellar</h3>
                <form id="edit-cellar-form">
                    <div class="form-group">
                        <label for="edit-cellar-name">Name</label>
                        <input type="text" id="edit-cellar-name" name="name" placeholder="e.g., Main Cellar">
                    </div>
                    <div class="form-group">
                        <label for="edit-cellar-temperature">Temperature (°F)</label>
                        <input type="number" id="edit-cellar-temperature" name="temperature" placeholder="e.g., 55" step="0.1">
                    </div>
                    <div class="form-actions">
                        <button type="button" id="edit-cellar-cancel" class="btn-secondary">Cancel</button>
                        <button type="submit" class="btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Delete Cellar Confirmation Dialog -->
        <div id="delete-cellar-dialog" class="overlay hidden">
            <div class="overlay-content dialog-content">
                <button class="overlay-close" onclick="window.cellarManager.hideDeleteDialog()">×</button>
                <h3>Delete Cellar</h3>
                <p class="delete-message"></p>
                <div class="form-actions">
                    <button type="button" id="delete-cellar-cancel" class="btn-secondary">Cancel</button>
                    <button type="button" id="delete-cellar-confirm" class="btn-danger">Delete</button>
                </div>
            </div>
        </div>
        </div>

        <!-- Debug Panel -->
        <div id="debug-panel" class="debug-panel minimized">
            <div class="debug-header">
                <h3>Debug Console</h3>
                <div class="debug-controls">
                    <button id="debug-clear-btn" class="debug-btn" title="Clear">Clear</button>
                    <button id="debug-toggle-btn" class="debug-btn" title="Expand">+</button>
                </div>
            </div>
            <div id="debug-content" class="debug-content">
                <!-- Debug messages will appear here -->
            </div>
        </div>
    </div>

    <script src="debug.js"></script>
    <script type="module">
        // Add error handling for module loading
        window.addEventListener('error', (e) => {
            // Only log actual errors, not trusted events
            if (e.message && e.filename) {
                console.error('Global error:', e.message, 'at', e.filename + ':' + e.lineno);
                if (window.debugPanel) {
                    window.debugPanel.addMessage('error', ['Global error:', e.message, e.filename, e.lineno]);
                }
            }
        });
        
        // Load the main app
        import('./app.js').catch(error => {
            console.error('Failed to load app.js:', error);
            if (window.debugPanel) {
                window.debugPanel.addMessage('error', ['Failed to load app.js:', error.message]);
            }
            alert('Failed to load app.js. Check console for details.');
        });
    </script>
</body>
</html>
